<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Emotion Detection</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #141e30, #243b55);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            background: rgba(255,255,255,0.1);
            padding:40px;
            border-radius:20px;
            text-align:center;
            width:400px;
            box-shadow:0 8px 20px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }

        h1{
            margin-bottom:20px;
            font-size:32px;
        }

        input[type="file"]{
            margin:20px 0;
            padding:10px;
            color:white;
        }

        button{
            background:#00c6ff;
            border:none;
            padding:12px 25px;
            border-radius:10px;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0072ff;
            transform:scale(1.05);
        }

        .result{
            margin-top:30px;
        }

        .emotion{
            font-size:28px;
            margin:10px 0;
        }

        .confidence{
            font-size:20px;
            margin-bottom:20px;
        }

        img{
            width:250px;
            border-radius:15px;
            border:3px solid white;
            margin-top:10px;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>😊 AI Emotion Detector</h1>

        <form action="/predict" method="POST" enctype="multipart/form-data">

            <input type="file" name="file" accept="image/*" required>

            <br>

            <button type="submit">Predict Emotion</button>

        </form>

        {% if prediction %}

        <div class="result">

            <h2>Prediction Result</h2>

            <div class="emotion">
                {{ prediction }}
            </div>

            <div class="confidence">
                Confidence: {{ confidence }}%
            </div>

            <img src="{{ image_path }}" alt="Uploaded Image">

        </div>

        {% endif %}

    </div>

</body>
</html>
